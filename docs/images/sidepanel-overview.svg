<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">xPoster side panel overview</title>
  <desc id="desc">A simplified xPoster side panel showing draft input, readiness checks, preview, and import controls.</desc>
  <rect width="1200" height="720" fill="#f6f3ec"/>
  <rect x="64" y="48" width="1072" height="624" rx="24" fill="#1f2a24"/>
  <rect x="88" y="72" width="1024" height="576" rx="18" fill="#fbfaf7"/>
  <rect x="88" y="72" width="1024" height="92" rx="18" fill="#25352d"/>
  <text x="128" y="118" fill="#f6f3ec" font-family="Arial, sans-serif" font-size="30" font-weight="700">xPoster</text>
  <text x="128" y="146" fill="#d9e2d6" font-family="Arial, sans-serif" font-size="18">Import Markdown to X Articles</text>
  <rect x="880" y="100" width="188" height="36" rx="18" fill="#d9ead8"/>
  <text x="914" y="124" fill="#203327" font-family="Arial, sans-serif" font-size="15" font-weight="700">X tab checked</text>
  <rect x="128" y="196" width="294" height="412" rx="12" fill="#ffffff" stroke="#d9d3c7" stroke-width="2"/>
  <text x="154" y="236" fill="#211f1b" font-family="Arial, sans-serif" font-size="22" font-weight="700">1. Paste Markdown</text>
  <rect x="154" y="264" width="242" height="286" rx="8" fill="#f3efe6"/>
  <text x="176" y="304" fill="#5c574f" font-family="Arial, sans-serif" font-size="18">---</text>
  <text x="176" y="334" fill="#5c574f" font-family="Arial, sans-serif" font-size="18">title: My Article</text>
  <text x="176" y="364" fill="#5c574f" font-family="Arial, sans-serif" font-size="18">---</text>
  <text x="176" y="414" fill="#211f1b" font-family="Arial, sans-serif" font-size="20" font-weight="700"># Heading</text>
  <text x="176" y="452" fill="#211f1b" font-family="Arial, sans-serif" font-size="18">Paragraph, image, table...</text>
  <rect x="154" y="564" width="116" height="34" rx="17" fill="#25352d"/>
  <text x="185" y="587" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="700">Example</text>
  <rect x="454" y="196" width="294" height="412" rx="12" fill="#ffffff" stroke="#d9d3c7" stroke-width="2"/>
  <text x="480" y="236" fill="#211f1b" font-family="Arial, sans-serif" font-size="22" font-weight="700">2. Check readiness</text>
  <g font-family="Arial, sans-serif" font-size="17">
    <rect x="480" y="272" width="236" height="44" rx="10" fill="#e7f3e4"/>
    <text x="498" y="300" fill="#24462c">✓ Markdown loaded</text>
    <rect x="480" y="330" width="236" height="44" rx="10" fill="#e7f3e4"/>
    <text x="498" y="358" fill="#24462c">✓ X Article open</text>
    <rect x="480" y="388" width="236" height="44" rx="10" fill="#fff2c7"/>
    <text x="498" y="416" fill="#5b4312">! Image permission</text>
    <rect x="480" y="446" width="236" height="44" rx="10" fill="#e7f3e4"/>
    <text x="498" y="474" fill="#24462c">✓ Editor bridge ready</text>
  </g>
  <rect x="480" y="542" width="178" height="46" rx="23" fill="#25352d"/>
  <text x="520" y="572" fill="#ffffff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Check article</text>
  <rect x="780" y="196" width="294" height="412" rx="12" fill="#ffffff" stroke="#d9d3c7" stroke-width="2"/>
  <text x="806" y="236" fill="#211f1b" font-family="Arial, sans-serif" font-size="22" font-weight="700">3. Import and review</text>
  <rect x="806" y="270" width="242" height="76" rx="10" fill="#edf0eb"/>
  <text x="826" y="302" fill="#211f1b" font-family="Arial, sans-serif" font-size="18" font-weight="700">Preview</text>
  <text x="826" y="328" fill="#5c574f" font-family="Arial, sans-serif" font-size="16">Title, text, images, tables</text>
  <rect x="806" y="372" width="242" height="76" rx="10" fill="#edf0eb"/>
  <text x="826" y="404" fill="#211f1b" font-family="Arial, sans-serif" font-size="18" font-weight="700">Import</text>
  <text x="826" y="430" fill="#5c574f" font-family="Arial, sans-serif" font-size="16">Fills X Article draft only</text>
  <rect x="806" y="474" width="242" height="76" rx="10" fill="#edf0eb"/>
  <text x="826" y="506" fill="#211f1b" font-family="Arial, sans-serif" font-size="18" font-weight="700">Manual publish</text>
  <text x="826" y="532" fill="#5c574f" font-family="Arial, sans-serif" font-size="16">You click Publish in X</text>
  <path d="M426 402h24" stroke="#25352d" stroke-width="5" stroke-linecap="round"/>
  <path d="M748 402h24" stroke="#25352d" stroke-width="5" stroke-linecap="round"/>
</svg>
