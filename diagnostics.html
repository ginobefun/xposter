<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xPoster Diagnostics</title>
    <link rel="icon" href="assets/icon-32.png" />
    <link rel="stylesheet" href="diagnostics.css" />
  </head>
  <body>
    <main>
      <header>
        <p>xPoster</p>
        <h1>Diagnostics</h1>
      </header>
      <div class="actions">
        <button id="run">Check active X tab</button>
        <button id="openArticles" class="secondary">Open X Articles</button>
        <button id="openSidePanel" class="secondary">Open side panel</button>
        <button id="copyJson" class="secondary" disabled>Copy JSON</button>
      </div>
      <section id="summary" class="summary">
        <div><span>Target</span><strong id="target">Unknown</strong></div>
        <div><span>Route</span><strong id="route">Unknown</strong></div>
        <div><span>Content</span><strong id="content">Unknown</strong></div>
        <div><span>Main</span><strong id="main">Unknown</strong></div>
        <div><span>Editor</span><strong id="editor">Unknown</strong></div>
        <div><span>Upload</span><strong id="upload">Unknown</strong></div>
        <div><span>Article</span><strong id="article">Unknown</strong></div>
        <div><span>Content risk</span><strong id="contentRisk">Unknown</strong></div>
        <div><span>Vault</span><strong id="vault">Unknown</strong></div>
      </section>
      <ol id="gateList" class="gate-list" aria-label="Live verification gate">
        <li data-tone="idle">Run diagnostics after opening an X Articles tab.</li>
      </ol>
      <pre id="details">Run diagnostics after opening an X Articles tab.</pre>
    </main>
    <script src="diagnostics.js"></script>
  </body>
</html>
